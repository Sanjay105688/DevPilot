services:
  # 1. Python FastAPI Backend Service (Dockerized with compilers)
  - type: web
    name: devpilot-api
    env: docker
    dockerfilePath: Dockerfile
    autoDeploy: false
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_MODEL
        value: llama-3.3-70b-versatile
      - key: CORS_ORIGINS
        value: '["https://devpilot-web.onrender.com"]'

  # 2. Frontend React Static Website (Free static site)
  - type: static
    name: devpilot-web
    env: static
    buildCommand: npm install && npm run build
    publishPath: dist
    autoDeploy: false
    routes:
      - type: rewrite
        source: /api/*
        destination: https://devpilot-api.onrender.com/api/*
      - type: rewrite
        source: /*
        destination: /index.html
