services:
  # Unified Web Service (React Frontend + FastAPI Backend with Runtimes)
  - type: web
    name: devpilot
    env: docker
    dockerfilePath: Dockerfile
    autoDeploy: false
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_MODEL
        value: llama-3.3-70b-versatile
      - key: CORS_ORIGINS
        value: '["*"]'
